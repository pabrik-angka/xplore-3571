<!DOCTYPE html>
<html lang="id" data-theme="bumblebee">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xplore 3571 - GIS PWA</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  
  <!-- Tailwind v4 & DaisyUI v5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  
  <!-- Leaflet GIS Engine CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="h-screen w-screen overflow-hidden bg-base-200 font-sans antialiased">

  <!-- Main Layout Grid Builder -->
  <div class="flex h-full w-full overflow-hidden">
    
    <!-- Sidebar Left Layout (Dikelola Komponen Dinamis) -->
    <aside id="sidebar-container" class="h-full w-80 bg-base-100 border-r border-base-300 transition-all duration-300 flex flex-col flex-none z-50 shadow-xl"></aside>
    
    <!-- Main Content Area Right Layout -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
      <!-- Top Navbar Container -->
      <div id="navbar-container" class="w-full flex-none"></div>

      <!-- Map Container Area -->
      <main class="flex-1 w-full h-full relative z-10">
        <div id="map" class="w-full h-full"></div>
      </main>
    </div>
  </div>

  <!-- Shared Modals Area Container (Injeksi Dialog via ui.js) -->
  <div id="modal-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
